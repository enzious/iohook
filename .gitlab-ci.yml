stages:
  - build

build:
  stage: build
  # rules:
  #   - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+/'
  script:
    - >-
      call "C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\VC\Auxiliary\Build\vcvarsall.bat" x64
    - git submodule init
    - git submodule update
    - cd glib
    - meson _build
    - ninja -C _build
    - cd ..
    - call npm install
    - npm run build
