stages:
  - build

.build:
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+/'

windows-build:
  extends: .build
  tags:
    - windows10
  script:
    - >-
      "C:\Program Files\Microsoft Visual Studio\18\Community\VC\Auxiliary\Build\vcvarsall.bat" x64
    - git submodule init
    - git submodule update
    - cd glib
    - meson setup _build
    - ninja -C _build
    - cd ..
    - npm install --ignore-scripts
    - npm run build:ci

linux-build:
  extends: .build
  tags:
    - linux
  script:
    - git submodule init
    - git submodule update
    - cd glib
    - meson setup _build
    - ninja -C _build
    - cd ..
    - npm install --ignore-scripts
    - npm run build:ci

darwin-arm64-build:
  extends: .build
  tags:
    - darwin-arm64
  script:
    - git submodule init
    - git submodule update
    - cd glib
    - meson setup _build
    - ninja -C _build
    - cd ..
    - npm install --ignore-scripts
    - npm run build:ci
