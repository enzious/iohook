stages:
  - build

.build:
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+/'

windows-build:
  extends: .build
  tags:
    - windows10
  script:
    - >-
      call "C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\VC\Auxiliary\Build\vcvarsall.bat" x64
    - git submodule init
    - git submodule update
    - cd glib
    - meson _build
    - ninja -C _build
    - cd ..
    - call yarn --ignore-scripts
    - yarn build:ci

linux-build:
  extends: .build
  tags:
    - linux
  script:
    - git submodule init
    - git submodule update
    - cd glib
    - meson _build
    - ninja -C _build
    - cd ..
    - yarn --ignore-scripts
    - yarn build:ci

darwin-arm64-build:
  extends: .build
  tags:
    - darwin-arm64
  script:
    - git submodule init
    - git submodule update
    - cd glib
    - meson _build
    - ninja -C _build
    - cd ..
    - yarn --ignore-scripts
    - yarn build:ci
