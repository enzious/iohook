stages:
  - build

build:
  stage: build
  # rules:
  #   - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+/'
  script:
    - git submodule init
    - git submodule update
    - cd glib
    - dir
    - meson _build
    - ninja -C _build
    # - >-
    #   sed -i 's/^  "version": "0.7.0\(-dev\)\?",/  "version": "'"${CI_COMMIT_TAG#?}"'",/' package.json
    - npm run build
